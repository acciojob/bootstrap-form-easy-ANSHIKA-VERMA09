<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
	<!-- the entire body must be written by student -->
	<div class="container-fluid">
		<h1 class="mb-5 mt-5 text-center">Internship Form</h1>
	<form>
		<div class="mb-3 row">
		<div class="col-4">
		<label for="first-name-input" class="form-label">First Name</label>
		<input type="text" class="form-control" id="first-name-input" required>
		</div>
		<div class="col-4">
		<label for="last-name-input" class="form-label">Last Name</label>
		<input type="text" class="form-control" id="last-name-input" required>
		</div>
		<div class="col-4">
		<label for="email-input" class="form-label">Email</label>
		<input type="text" class="form-control" id="email-input" required>
		</div>

		<div class="mb-3 row">
		<div class="col-6">
		<label for="college-input" class="form-label">College</label>
		<input type="text" class="form-control" id="college-input" required>
		</div>
		<div class="col-3">
		<label for="select-input" class="form-label">Graduation Year</label>
		<select class="form-select" aria-label="Default select example" id="select-input" required>
        <option selected>Choose...</option>
        <option value="1">2020</option>
        <option value="2">2021</option>
        <option value="3">2022</option>
        <option value="3">2023</option>
        </select>
		</div>
		<div class="col-3">
		<label for="roll-no-input" class="form-label">Roll No.</label>
		<input type="number" class="form-control" id="roll-no-input"></div>
		</div>
		<div>
		<div class="form-check mb-4">
        <input class="form-check-input" type="checkbox" value="" id="checkDefault" required>
        <label class="form-check-label" for="conditions-checkbox">
         Agree to terms and conditions
        </label>
         </div>
		<div>
		<button type="button mt-5" class="btn btn-primary">Submit</button>	
		</div>
		
	</form>
	</div>
    <script type="text/javascript" src="./script.js">
		<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
</script>

</body>

</html>
