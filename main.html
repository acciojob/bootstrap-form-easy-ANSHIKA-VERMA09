<!DOCTYPE html>
<html>

<head>
  <title>Internship Form</title>

  <link 
    rel="stylesheet" 
    href="styles.css"
  >

  <link 
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" 
    rel="stylesheet"
  >
</head>

<body>

  <div class="container mt-5">

    <h1 class="text-center mb-5">
      Internship Form
    </h1>

    <form>

      <!-- First Row -->

      <div class="row mb-3">

        <div class="col-md-4">

          <label 
            for="first-name-input" 
            class="form-label"
          >
            First Name
          </label>

          <input 
            type="text"
            class="form-control"
            id="first-name-input"
            required
          >

          <div class="invalid-feedback">
            Please enter first name
          </div>

        </div>

        <div class="col-md-4">

          <label 
            for="last-name-input" 
            class="form-label"
          >
            Last Name
          </label>

          <input 
            type="text"
            class="form-control"
            id="last-name-input"
            required
          >

          <div class="invalid-feedback">
            Please enter last name
          </div>

        </div>

        <div class="col-md-4">

          <label 
            for="email-input" 
            class="form-label"
          >
            Email Address
          </label>

          <input 
            type="email"
            class="form-control"
            id="email-input"
            required
          >

          <div class="invalid-feedback">
            Please enter email address
          </div>

        </div>

      </div>

      <!-- Second Row -->

      <div class="row mb-3">

        <div class="col-md-6">

          <label 
            for="college-input" 
            class="form-label"
          >
            College
          </label>

          <input 
            type="text"
            class="form-control"
            id="college-input"
            required
          >

          <div class="invalid-feedback">
            Please enter college name
          </div>

        </div>

        <div class="col-md-3">

          <label 
            for="grad-year-select" 
            class="form-label"
          >
            Graduation Year
          </label>

          <select 
            class="form-select"
            id="grad-year-select"
            required
          >

            <option selected disabled>
              Choose...
            </option>

            <option>2020</option>
            <option>2021</option>
            <option>2022</option>
            <option>2023</option>

          </select>

          <div class="invalid-feedback">
            Please select graduation year
          </div>

        </div>

        <div class="col-md-3">

          <label 
            for="roll-no-input" 
            class="form-label"
          >
            Roll No.
          </label>

          <input 
            type="text"
            class="form-control"
            id="roll-no-input"
            required
          >

          <div class="invalid-feedback">
            Please enter roll number
          </div>

        </div>

      </div>

      <!-- Checkbox -->

      <div class="form-check mb-4">

        <input 
          class="form-check-input"
          type="checkbox"
          id="conditions-checkbox"
          required
        >

        <label 
          class="form-check-label"
          for="conditions-checkbox"
        >
          Agree to terms and conditions
        </label>

        <div class="invalid-feedback">
          Please agree before submitting
        </div>

      </div>

      <!-- Submit Button -->

      <button 
        type="submit"
        class="btn btn-primary"
      >
        Submit
      </button>

    </form>

  </div>

  <!-- Bootstrap JS -->

  <script src="./script.js"></script>

  <script 
    src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js">
  </script>

  <script 
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js">
  </script>

</body>

</html>
